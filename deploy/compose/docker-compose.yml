services:
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      network: host
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        GITHUB_PROXY: ${GITHUB_PROXY:-}
    env_file:
      - ../../.env
    ports:
      - "127.0.0.1:${BACKEND_PORT:-18082}:3000"
      - "127.0.0.1:${HY2_AUTH_PORT:-9998}:${HY2_AUTH_PORT:-9998}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app-network
      - 1panel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  app-network:
    driver: bridge
  1panel-network:
    external: true
