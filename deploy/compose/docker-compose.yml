services:
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
      network: host
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        GITHUB_PROXY: ${GITHUB_PROXY:-}
    env_file:
      - ../../.env
    ports:
      - "127.0.0.1:${BACKEND_PORT:-18082}:3000"
      - "127.0.0.1:${HY2_AUTH_PORT:-9998}:${HY2_AUTH_PORT:-9998}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    networks:
      - app-network
      - 1panel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-subscription}
      MYSQL_USER: ${MYSQL_USER:-subscription}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:18.3-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-subscription}
      POSTGRES_USER: ${POSTGRES_USER:-subscription}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  app-network:
    driver: bridge
  1panel-network:
    external: true

volumes:
  mysql-data:
  postgres-data:
